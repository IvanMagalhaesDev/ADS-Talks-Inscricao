<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADSTalks — Inscrições</title>
  <link rel="stylesheet" href="style.css" />
  <noscript><style>.js-only { display: none !important; }</style></noscript>
</head>
<body>

  <header>
    <h1>ADSTalks</h1>
    <p>Um papo sobre desenvolvimento mobile e carreiras</p>
    <p> Auditório IFCE Campus Boa Viagem &nbsp;|&nbsp; 13/03 &nbsp;|&nbsp; 13h30</p>
    <p id="datetime" class="js-only"></p>
  </header>

  <div id="welcome" class="js-only banner" role="alert" hidden></div>

  <main>

    <!-- FORMULÁRIO -->
    <!-- Progressive Enhancement: funciona sem JS via action/method -->
    <section>
      <h2>Inscreva-se</h2>
      <form id="form" action="#" method="post" novalidate>

        <label for="nome">Nome completo *</label>
        <input type="text" id="nome" name="nome" placeholder="Seu nome" required aria-required="true" aria-describedby="erro-nome" />
        <span class="erro" id="erro-nome" role="alert"></span>

        <label for="email">E-mail *</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required aria-required="true" aria-describedby="erro-email" />
        <span class="erro" id="erro-email" role="alert"></span>

        <label for="ingresso">Tipo de ingresso *</label>
        <select id="ingresso" name="ingresso" required aria-required="true" aria-describedby="erro-ingresso">
          <option value="" disabled selected>Selecione…</option>
          <option value="padrao">Padrão</option>
          <option value="vip">VIP</option>
          <option value="convidado">Convidado</option>
        </select>
        <span class="erro" id="erro-ingresso" role="alert"></span>

        <label class="check-label">
          <input type="checkbox" id="presenca" name="presenca" value="sim" />
          Confirmo minha presença
        </label>

        <label class="check-label">
          <input type="checkbox" id="novidades" name="novidades" value="sim" aria-controls="topicos" />
          Quero receber novidades do ADSTalks
        </label>

        <!-- Campo dinâmico: aparece ao marcar novidades (JS) -->
        <fieldset id="topicos" class="js-only" hidden aria-hidden="true">
          <legend>Qual assunto te interessa?</legend>
          <label><input type="checkbox" name="topico" value="dev-mobile" /> Dev Mobile</label>
          <label><input type="checkbox" name="topico" value="back-end" /> Back-end</label>
          <label><input type="checkbox" name="topico" value="front-end" /> Front-end</label>
          <label><input type="checkbox" name="topico" value="carreiras" /> Carreiras em TI</label>
          <label><input type="checkbox" name="topico" value="pesquisa" /> Pesquisa / Pós</label>
          <label><input type="checkbox" name="topico" value="mercado" /> Mercado de trabalho</label>
        </fieldset>

        <button type="submit">Confirmar Inscrição</button>

      </form>
    </section>

    <!-- LISTA DE INSCRITOS -->
    <section>
      <h2>Inscritos <span id="contador">(0)</span></h2>
      <p id="vazio">Nenhuma inscrição ainda.</p>
      <ul id="lista" aria-label="Lista de inscritos"></ul>
    </section>

  </main>

  <footer>
    <p>&lt;/&gt; ADS 2024.1 · IFCE Campus Boa Viagem · Centro Acadêmico Gestão Nikola Tesla</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
